<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Manga Translator</title>
  <style>
    body {
      width: 320px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
    }

    h1 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 15px;
      text-align: center;
      color: #333;
    }

    .control-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      color: #666;
      font-weight: 600;
    }

    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      background-color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #FF5722;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #F4511E;
    }

    #status {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
      text-align: center;
      min-height: 1.2em;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 15px;
    }

    .status-indicator {
      font-size: 12px;
      margin-bottom: 15px;
      padding: 5px;
      border-radius: 4px;
      background: #f5f5f5;
      text-align: center;
    }
  </style>
</head>

<body>
  <h1>Manga Translator</h1>

  <div id="server-status" class="status-indicator">● Local Server: Checking...</div>
  <div class="control-group">
    <label for="source-lang">Source Language</label>
    <select id="source-lang">
      <option value="eng">English</option>
      <option value="jpn">Japanese (日本語)</option>
      <option value="kor">Korean (한국어)</option>
      <option value="chi_sim">Chinese (简体中文)</option>
      <option value="chi_tra">Chinese (繁體中文)</option>
    </select>
  </div>

  <div class="control-group">
    <label for="target-lang">Target Language (Translation):</label>
    <select id="target-lang">
      <option value="zh-CN">Chinese (Simplified)</option>
      <option value="en">English</option>
      <option value="jpn">Japanese</option>
      <option value="ko">Korean</option>
    </select>
  </div>

  <div class="control-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
    <input type="checkbox" id="vertical-toggle" style="width: auto;">
    <label for="vertical-toggle" style="margin-bottom: 0;">Vertical Text (竖排文字)</label>
  </div>

  <button id="select-btn">Select Area to Translate</button>

  <div class="note">Hold <b>Ctrl</b> while selecting to see Debug Image.</div>
  <div class="note">First use of a new language will download data (~15MB).</div>
  <div id="status">Ready</div>

  <script src="popup.js"></script>
</body>

</html>
